name: Deploy avaluaTFM to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'avaluaTFM/**'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout codi
        uses: actions/checkout@v4

      - name: Configura Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Instal·la dependències
        run: |
          cd avaluaTFM
          npm ci

      - name: Compila l'aplicació
        run: |
          cd avaluaTFM
          npm run build

      - name: Desplega a gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./avaluaTFM/dist
          destination_dir: avaluaTFM
